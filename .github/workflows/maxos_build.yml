name: Build macOS App

on:
  push:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pygame pgzero pyinstaller

      - name: Build macOS app
        run: python -m PyInstaller --windowed --add-data "images:images" --add-data "music:music" --collect-all pgzero --collect-all pygame mineral_explorer.py

      - name: Zip the .app (preserve permissions)
        run: ditto -c -k --sequesterRsrc --keepParent dist/mineral_explorer.app mineral_explorer-macos.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos_build
          path: mineral_explorer-macos.zip